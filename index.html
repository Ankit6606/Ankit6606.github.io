<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry Saheli 💔</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* Main Page */
#mainPage {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

h2 {
  margin-bottom: 20px;
  padding: 0 20px;
}

/* Button container to avoid overlap */
#btnContainer {
  position: relative;
  width: 260px;
  height: 120px;
}

/* Buttons */
button {
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
}

#yesBtn {
  background-color: #ff4d6d;
  color: white;
  position: relative;
  z-index: 1;
}

#noBtn {
  background-color: #444;
  color: white;
  position: absolute;
  top: 60px;
  left: 120px;
}

/* Final Page */
#finalPage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  padding: 20px;
}

.final-content h1 {
  font-size: clamp(18px, 5vw, 26px);
  color: white;
  line-height: 1.5;
}

/* Flower animation */
.flower {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}
</style></head><body><!-- MAIN PAGE --><div id="mainPage">
  <h2 id="question">Saheli... I am really sorry for my mistake 💔</h2>  <div id="btnContainer">
    <button id="yesBtn">Forgive Me ❤️</button>
    <button id="noBtn">Still No 😔</button>
  </div>
</div><!-- FINAL PAGE --><div id="finalPage">
  <div class="final-content">
    <h1>
      Thank you for forgiving me 💖<br><br>
      I promise I’ll shower chocolates on u this time…<br>
      and never let you feel like this 🌸
    </h1>
  </div>
</div><script>
let step = 0;

const messages = [
  "You just don't deserve a chocolate, you deserve the whole chocolate factory",
  "You mean a lot to me, Saheli… more than I showed 💔",
  "I really care for u baby, but I am scared sometimes as well🥺",
  "Not just princess, u are a queen in my heart",
  "I promise I'll be better… for you 💖"
];

const question = document.getElementById("question");
const noBtn = document.getElementById("noBtn");
const container = document.getElementById("btnContainer");

/* Move No button inside container */
function moveButton() {
  let x = Math.random() * (container.clientWidth - 100);
  let y = Math.random() * (container.clientHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  if (step < messages.length) {
    question.innerText = messages[step];
    step++;
  }
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

/* Yes button */
document.getElementById("yesBtn").onclick = function() {
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("finalPage").style.display = "flex";
  startFlowers();
};

/* Flower animation */
function startFlowers() {
  setInterval(() => {
    let flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = "🌸";
    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(flower);

    setTimeout(() => flower.remove(), 5000);
  }, 200);
}
</script></body>
</html>
