<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry Saheli 💔</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* Main Page */
#mainPage {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

h2 {
  margin-bottom: 20px;
  padding: 0 20px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  position: relative;
}

button:first-of-type {
  background-color: #ff4d6d;
  color: white;
}

#noBtn {
  background-color: #444;
  color: white;
  position: absolute;
}

/* Final Page */
#finalPage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  padding: 20px;
}

.final-content h1 {
  font-size: clamp(18px, 5vw, 26px);
  color: white;
  line-height: 1.5;
}

/* Flower animation */
.flower {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- MAIN PAGE -->
<div id="mainPage">
  <h2 id="question">Saheli... I am really sorry for my mistake 💔</h2>

  <button id="yesBtn">Forgive Me ❤️</button>
  <button id="noBtn">Still No 😔</button>
</div>

<!-- FINAL PAGE -->
<div id="finalPage">
  <div class="final-content">
    <h1>
      Thank you for giving me one last chance 💖<br><br>
      I promise I’ll make things right this time…<br>
      and never give you a reason to feel hurt again 🌸
    </h1>
  </div>
</div>

<script>
let step = 0;

const messages = [
  "I know I hurt you… and I truly regret it 😔",
  "You mean a lot to me, Saheli… more than I showed 💔",
  "I didn’t realize my mistake then… but I do now 🥺",
  "Please give me one chance to fix everything 🙏",
  "I promise I'll be better… for you 💖",
  "I miss u… can u forgive me? 🌸",
  "Just one last chance… I won’t let you down 😔💞"
];

const question = document.getElementById("question");
const noBtn = document.getElementById("noBtn");

/* No button moves */
function moveButton() {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  if (step < messages.length) {
    question.innerText = messages[step];
    step++;
  }
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

/* Yes button */
document.getElementById("yesBtn").onclick = function() {
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("finalPage").style.display = "flex";
  startFlowers();
};

/* Flower animation */
function startFlowers() {
  setInterval(() => {
    let flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = "🌸";
    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(flower);

    setTimeout(() => flower.remove(), 5000);
  }, 200);
}
</script>

</body>
</html>
