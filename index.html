<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Saheli 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* Card */
.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
    color: #ff4d6d;
}

p {
    font-size: 16px;
    color: #444;
    line-height: 1.5;
}

/* Buttons */
.buttons {
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

#yesBtn {
    background: #ff4d6d;
    color: white;
}

#noBtn {
    background: #ccc;
}

/* Celebration Page */
#celebrationPage {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

#celebrationPage h1 {
    color: #ff4d6d;
}

/* Flowers */
.flower {
    position: absolute;
    font-size: 24px;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<div class="card" id="mainCard">
    <h1>Hey Saheli 💖</h1>

    <p id="proposalText">
        Excuse me, miss… 🌹  
        I've been waiting to ask you this for so long...  
        Will you go on a date with me? 💕
    </p>

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 🙈</button>
    </div>
</div>

<div id="celebrationPage">
    <h1>
        🌸 You just saved a 24 year kid by accepting his date offer 💖<br><br>
        He is now at your service and ready to make your day special ✨
    </h1>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const text = document.getElementById("proposalText");
const mainCard = document.getElementById("mainCard");
const celebrationPage = document.getElementById("celebrationPage");

let step = 0;

const proposals = [
"Okay maybe I was too formal 😅💖<br><br> Saheli, will you go on a cute little date with me? 🌹",
"Still no? 🥺<br><br> What if I promise coffee, laughs, and a really nice time? ☕💕",
"Alright… one more try 😌💖<br><br> I really want to take you out and make you smile… will you? 🌸",
"Okay now I’m nervous 😳💘<br><br> Please say yes? 💖",
"This is my final try 🥹💞<br><br> I’d genuinely love to spend time with you… will you give me a chance? 🌹✨"
];

noBtn.addEventListener("click", () => {
    if (step < proposals.length) {
        text.innerHTML = proposals[step];
        step++;
    }
});

yesBtn.addEventListener("click", () => {
    mainCard.style.display = "none";
    celebrationPage.style.display = "flex";
    startFlowers();
});

/* Flower animation */
function startFlowers() {
    setInterval(() => {
        const flower = document.createElement("div");
        flower.classList.add("flower");
        flower.innerHTML = "🌸";
        flower.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(flower);

        setTimeout(() => {
            flower.remove();
        }, 5000);
    }, 200);
}
</script>

</body>
</html>
