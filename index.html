<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry Saheli 🍫💔</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

/* MAIN PAGE */
#mainPage {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #5a2d0c, #a0522d, #d2691e);
  color: #fff8e7;
}

h2 {
  margin-bottom: 20px;
  padding: 0 20px;
}

/* Button container */
#btnContainer {
  position: relative;
  width: 260px;
  height: 120px;
}

/* Buttons */
button {
  padding: 12px 22px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* YES BUTTON (chocolate cream style) */
#yesBtn {
  background: linear-gradient(145deg, #8b4513, #d2691e);
  color: #fff;
}

#yesBtn:hover {
  transform: scale(1.1);
}

/* NO BUTTON (dark chocolate) */
#noBtn {
  background: #3e2723;
  color: #fff;
  position: absolute;
  top: 60px;
  left: 120px;
}

/* FINAL PAGE */
#finalPage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #3e1f0d, #8b4513, #c68c53);
  padding: 20px;
}

.final-content h1 {
  font-size: clamp(18px, 5vw, 26px);
  color: #fff8e7;
  line-height: 1.5;
}

/* Chocolate falling animation */
.flower {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- MAIN PAGE -->
<div id="mainPage">
  <h2 id="question">Saheli... I am really sorry for my mistake 🍫💔</h2>

  <div id="btnContainer">
    <button id="yesBtn">Forgive Me 🍫❤️</button>
    <button id="noBtn">Still No 😔</button>
  </div>
</div>

<!-- FINAL PAGE -->
<div id="finalPage">
  <div class="final-content">
    <h1>
      Thank you for forgiving me 💖🍫<br><br>
      This time I’ll shower you with chocolates… 🍬🍫<br>
      and never let you feel sad again 🌸
    </h1>
  </div>
</div>

<script>
let step = 0;

const messages = [
  "You don’t just deserve chocolates… you deserve a whole chocolate factory 🍫",
  "You mean a lot to me, Saheli… more than I showed 💔",
  "I really care for u baby, even if I mess up sometimes 🥺",
  "Not just princess… u are my chocolate queen 👑🍫",
  "I promise I’ll be better… sweeter… for you 💖"
];

const question = document.getElementById("question");
const noBtn = document.getElementById("noBtn");
const container = document.getElementById("btnContainer");

/* Move No button inside container */
function moveButton() {
  let x = Math.random() * (container.clientWidth - 100);
  let y = Math.random() * (container.clientHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  if (step < messages.length) {
    question.innerText = messages[step];
    step++;
  }
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

/* Yes button */
document.getElementById("yesBtn").onclick = function() {
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("finalPage").style.display = "flex";
  startChocolates();
};

/* Chocolate falling animation */
function startChocolates() {
  setInterval(() => {
    let choco = document.createElement("div");
    choco.classList.add("flower");
    choco.innerHTML = "🍫";
    choco.style.left = Math.random() * 100 + "vw";
    choco.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(choco);

    setTimeout(() => choco.remove(), 5000);
  }, 200);
}
</script>

</body>
</html>
